<!DOCTYPE html>
<html>
<head>
    <title>V V V加速跳转页</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        .container {
            background-image: url('https://s2.loli.net/2023/12/04/NPBpjrZTwMXu5DA.webp');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .text {
            font-weight: bold;
            color: #FFF;
            border: 2px solid #FFF;
            padding: 10px;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
    <script>
        window.onload = function() {
            var count = 3;
            var textElement = document.getElementById('countdown');
            var countdown = setInterval(function() {
                textElement.textContent = count;
                count--;
                if (count < 0) {
                    clearInterval(countdown);
                    window.location.href = 'https://cdn.vvvfast.fun';
                }
            }, 1000);
        };
    </script>
</head>
<body>
    <div class="container">
        <p class="text">正在为您挑选访问最快的官网地址……</p>
        <p class="text">倒计时：<span id="countdown">3</span> 秒后自动跳转到官网</p>
    </div>
</body>
</html>
